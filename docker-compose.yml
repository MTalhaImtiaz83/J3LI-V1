version: "3.8"

services:
  j3li-api:
    build: .
    container_name: j3li-api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=j3li_local_dev
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - J3LI_LLM_PROVIDER=${J3LI_LLM_PROVIDER:-ollama}
      - J3LI_LLM_MODEL=${J3LI_LLM_MODEL:-llama3}
      - J3LI_EMBEDDING_PROVIDER=local
      - J3LI_EMBEDDING_MODEL=intfloat/multilingual-e5-large
    volumes:
      - ./data:/app/data
      - ./schema_registry.json:/app/schema_registry.json
      - model-cache:/root/.cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy
      milvus:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  neo4j:
    image: neo4j:5-community
    container_name: j3li-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/j3li_local_dev
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: j3li-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ALLOW_NONE_AUTHENTICATION=yes
    volumes:
      - etcd-data:/etcd

  minio:
    image: minio/minio:RELEASE.2023-12-20T01-00-02Z
    container_name: j3li-minio
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data

  milvus:
    image: milvusdb/milvus:v2.4-latest
    container_name: j3li-milvus
    ports:
      - "19530:19530"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus-data:/var/lib/milvus

volumes:
  neo4j-data:
  etcd-data:
  minio-data:
  milvus-data:
  model-cache:
